name: CI - Calidad de Software

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    name: Build, Test y Análisis de Calidad

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Compilar proyecto
        run: mvn compile

      - name: Ejecutar pruebas unitarias
        run: mvn test

      - name: Generar reporte JaCoCo
        run: mvn jacoco:report

      - name: Ejecutar Checkstyle
        run: mvn checkstyle:checkstyle
        continue-on-error: true

      - name: Ejecutar PMD
        run: mvn pmd:pmd
        continue-on-error: true

      - name: Ejecutar SpotBugs
        run: mvn spotbugs:spotbugs
        continue-on-error: true

      - name: Subir reportes como artefactos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reportes-calidad
          path: |
            target/site/jacoco/
            target/site/pmd.html
            target/site/checkstyle.html
            target/spotbugsXml.xml
